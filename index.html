<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <title>Nanjing 2026</title>
</head>

<body>
    <div class="wrapper">
        <form id="loginForm">
            <h1>Login</h1>

            <div class="inputBox">
                <input type="text" id="username" placeholder="Username" required autocomplete="username">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24"
                    class="iconInLogIn">
                    <path
                        d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5m0-8c1.65 0 3 1.35 3 3s-1.35 3-3 3-3-1.35-3-3 1.35-3 3-3M4 22h16c.55 0 1-.45 1-1v-1c0-3.86-3.14-7-7-7h-4c-3.86 0-7 3.14-7 7v1c0 .55.45 1 1 1m6-7h4c2.76 0 5 2.24 5 5H5c0-2.76 2.24-5 5-5">
                    </path>
                </svg>
            </div>

            <div class="inputBox">
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24"
                    class="iconInLogIn">
                    <path
                        d="M6 22h12c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2h-1V7c0-2.76-2.24-5-5-5S7 4.24 7 7v2H6c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2M9 7c0-1.65 1.35-3 3-3s3 1.35 3 3v2H9zm-3 4h12v9H6z">
                    </path>
                </svg>
            </div>

            <div class="btnForgot">
                <div class="item">
                    <button type="submit" class="button" id="loginBtn">
                        Login
                    </button>
                </div>

                <div class="item">
                    <div class="forgot">
                        <a
                            href="mailto:alfathrafiuddin13@gmail.com?subject=Password Reset Request&body=Username:%20[masukkan%20username%20Anda]%0APlease%20help%20me%20reset%20my%20password">Forgot
                            password?</a>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <div id="errorMessage" class="error-message"></div>
    <div id="loadingMessage" class="loading-message">Loading...</div>

    <script type="module">
        import { db } from './firebase_config.js';
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const loginForm = document.getElementById('loginForm');
        const errorDiv = document.getElementById('errorMessage');
        const loadingDiv = document.getElementById('loadingMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            // Reset messages
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';
            loadingDiv.style.display = 'block';

            // Validasi input tidak kosong
            if (!username || !password) {
                errorDiv.textContent = 'Username dan password harus diisi!';
                errorDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
                return;
            }

            try {
                // Cari voter di collection 'voters' berdasarkan userName
                const votersRef = collection(db, 'voters');
                const q = query(votersRef, where('userName', '==', username));
                const querySnapshot = await getDocs(q);

                // Cek apakah username ditemukan
                if (querySnapshot.empty) {
                    errorDiv.textContent = 'Username tidak ditemukan!';
                    errorDiv.style.display = 'block';
                    loadingDiv.style.display = 'none';
                    return;
                }

                // Ambil data voter
                const voterDoc = querySnapshot.docs[0];
                const voterData = voterDoc.data();

                // Verifikasi password
                if (voterData.password !== password) {
                    errorDiv.textContent = 'Password salah!';
                    errorDiv.style.display = 'block';
                    loadingDiv.style.display = 'none';
                    return;
                }

                // Simpan data voter ke localStorage untuk digunakan di halaman vote
                localStorage.setItem('currentVoter', JSON.stringify({
                    userName: voterData.userName,
                    email: voterData.email,
                    name: voterData.name,
                    hasVoted: voterData.hasVoted || false,
                    voterId: voterDoc.id,
                    createdAt: voterData.createdAt
                }));

                console.log("Login berhasil:", voterData.userName);
                loadingDiv.style.display = 'none';

                // Redirect ke halaman vote
                window.location.href = 'votePage.html';

            } catch (error) {
                console.error("Error saat login:", error);
                errorDiv.textContent = 'Login gagal: ' + error.message;
                errorDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
            }
        });

        // Optional: Handle Enter key press
        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>

</html>
