<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/pages/page-index.css">
    <title>Nanjing 2026 - Login</title>
</head>

<body>
    <div class="wrapper">
        <form id="loginForm">
            <h1>Login</h1>
            <div class="inputBox">
                <input type="text" id="username" placeholder="Username" required autocomplete="username">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24"
                    class="iconInLogIn">
                    <path
                        d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5m0-8c1.65 0 3 1.35 3 3s-1.35 3-3 3-3-1.35-3-3 1.35-3 3-3M4 22h16c.55 0 1-.45 1-1v-1c0-3.86-3.14-7-7-7h-4c-3.86 0-7 3.14-7 7v1c0 .55.45 1 1 1">
                    </path>
                </svg>
            </div>
            <div class="inputBox">
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24"
                    class="iconInLogIn">
                    <path
                        d="M6 22h12c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2h-1V7c0-2.76-2.24-5-5-5S7 4.24 7 7v2H6c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2M9 7c0-1.65 1.35-3 3-3s3 1.35 3 3v2H9zm-3 4h12v9H6z">
                    </path>
                </svg>
            </div>
            <div class="btnForgot">
                <div class="item">
                    <button type="submit" class="button" id="loginBtn">Login</button>
                </div>
                <div class="item">
                    <div class="forgot">
                        <a
                            href="mailto:alfathrafiuddin13@gmail.com?subject=Password Reset Request&body=Username:%20[masukkan%20username%20Anda]%0APlease%20help%20me%20reset%20my%20password">Forgot
                            password?</a>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <div id="errorMessage" class="error-message"></div>
    <div id="loadingMessage" class="loading-message" style="display: none;">Loading...</div>
    <div id="notification" class="notification" style="display: none;"></div>

    <script src="/js/config/env.js"></script>
    <script type="module" src="./js/pages/login-page.js"></script>

    <!-- Preload script untuk vote assets -->
    <script type="module">
        import { preloadVoteAssets } from './js/preload.js';

        // Jalankan preloading saat halaman index dimuat
        preloadVoteAssets();

        // Optional: Expose ke window untuk debugging
        window.preloadVoteAssets = preloadVoteAssets;
    </script>
</body>

</html>
